services:
  api:
    build: ./backend
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: agentgrid_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  frontend:
    image: node:22-alpine
    working_dir: /frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
